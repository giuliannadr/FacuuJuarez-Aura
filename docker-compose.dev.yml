# Solo Postgres para desarrollo local — las apps corren con `npm run dev`
# Uso: docker compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: aura_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: aura_dev_password
      POSTGRES_DB: aura_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura -d aura_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
